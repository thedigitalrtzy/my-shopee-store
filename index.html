<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopee Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { max-width: 1200px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
        h1 { text-align: center; color: #2d3748; margin-bottom: 30px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
        .product-name { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #1a202c; }
        .product-desc { color: #718096; margin-bottom: 12px; font-size: 14px; }
        .product-cat { display: inline-block; background: #ebf8ff; color: #2b6cb0; padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-bottom: 12px; }
        .shopee-btn { display: block; background: #ee4d2d; color: white; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .shopee-btn:hover { background: #d93f1f; }
    </style>
</head>
<body>
    <h1>🛒 My Shopee Affiliate Store</h1>
    <div class="products-grid" id="productsContainer"></div>

    <script>
        // 👇 PASTE YOUR OWN DETAILS HERE
        const SUPABASE_URL = "https://lorfrefpygfzbdlqbncb.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_KOLTyIoWvUdAqucODtO7xw_9gx9_j4Y";

        const { createClient } = supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);
            
            const container = document.getElementById('productsContainer');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image_url}" alt="${p.product_name}" class="product-img">
                    <h3 class="product-name">${p.product_name}</h3>
                    ${p.category ? `<span class="product-cat">${p.category}</span>` : ''}
                    <p class="product-desc">${p.description || ''}</p>
                    <a href="${p.shopee_link}" target="_blank" rel="noopener" class="shopee-btn">Buy on Shopee</a>
                </div>
            `).join('');
        }

        loadProducts();
    </script>
</body>
</html>
