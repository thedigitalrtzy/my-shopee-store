<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopee Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { max-width: 1200px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
        h1 { text-align: center; color: #2d3748; margin-bottom: 30px; font-size: 2.2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-4px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-name { font-size: 1.2rem; font-weight: bold; color: #1a202c; margin-bottom: 8px; }
        .product-desc { color: #4a5568; margin-bottom: 10px; line-height: 1.5; }
        .product-cat { display: inline-block; background: #ebf8ff; color: #2b6cb0; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 12px; }
        .shopee-btn { display: block; text-align: center; background: #ee4d2d; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .shopee-btn:hover { background: #d63f24; }
        .empty { text-align: center; color: #718096; padding: 50px 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <h1>🛒 My Shopee Affiliate Store</h1>
    <div class="products-grid" id="productsContainer">
        <div class="empty">Loading products...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://lorfrefpygfzbdlqbncb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KOLTyIoWvUdAqucODtO7xw_9gx9_j4Y";

        const { createClient } = supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const container = document.getElementById('productsContainer');
            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<div class="empty">Error loading products: ${error.message}</div>`;
                return;
            }

            if (products.length === 0) {
                container.innerHTML = `<div class="empty">No products added yet. Use your admin page to add your first product!</div>`;
                return;
            }

            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image_url}" alt="${p.product_name}" class="product-img">
                    <div class="product-info">
                        <h3 class="product-name">${p.product_name}</h3>
                        ${p.category ? `<span class="product-cat">${p.category}</span>` : ''}
                        ${p.description ? `<p class="product-desc">${p.description}</p>` : ''}
                        <a href="${p.shopee_link}" target="_blank" rel="noopener" class="shopee-btn">🛍️ Buy on Shopee</a>
                    </div>
                </div>
            `).join('');
        }

        loadProducts();
    </script>
</body>
</html>
