<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Product</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { max-width: 600px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
        h2 { text-align: center; margin-bottom: 20px; color: #2d3748; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #4a5568; }
        input, textarea, button { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        #preview { max-width: 200px; margin: 10px 0; border-radius: 8px; display: none; }
        .msg { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <h2>➕ Add New Product</h2>

    <form id="productForm">
        <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="desc" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" id="cat" placeholder="e.g. Electronics, Fashion">
        </div>
        <div class="form-group">
            <label>Product Image *</label>
            <input type="file" id="image" accept="image/*" required>
            <img id="preview" alt="Preview">
        </div>
        <div class="form-group">
            <label>Shopee Link *</label>
            <input type="url" id="link" required placeholder="Paste your full affiliate link">
        </div>
        <button type="submit">💾 Save Product</button>
        <div id="msg" class="msg"></div>
    </form>

    <script>
        // 👇 PASTE YOUR SAME DETAILS HERE
        const SUPABASE_URL = "YOUR_API_URL_HERE";
        const SUPABASE_KEY = "YOUR_PUBLISHABLE_KEY_HERE";

        const { createClient } = supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Show image preview
        document.getElementById('image').addEventListener('change', e => {
            const preview = document.getElementById('preview');
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        });

        document.getElementById('productForm').addEventListener('submit', async e => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.style.display = 'none';

            try {
                // 1. Upload image to storage
                const file = document.getElementById('image').files[0];
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadErr } = await supabase.storage
                    .from('product-images')
                    .upload(fileName, file);

                if (uploadErr) throw uploadErr;

                // 2. Get public image link
                const { data: { publicUrl } } = supabase.storage
                    .from('product-images')
                    .getPublicUrl(fileName);

                // 3. Save product to database
                const { error: dbErr } = await supabase.from('products').insert({
                    product_name: document.getElementById('name').value,
                    description: document.getElementById('desc').value,
                    category: document.getElementById('cat').value,
                    image_url: publicUrl,
                    shopee_link: document.getElementById('link').value
                });

                if (dbErr) throw dbErr;

                // Success
                msg.textContent = "✅ Product saved successfully! Go check your store.";
                msg.className = "msg success";
                msg.style.display = 'block';
                e.target.reset();
                document.getElementById('preview').style.display = 'none';

            } catch (err) {
                msg.textContent = "❌ Error: " + err.message;
                msg.className = "msg error";
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
